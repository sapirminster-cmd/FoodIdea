    :root {
      --bg:#f0ece6; --surface:#e8e2d8; --surface2:#ddd6ca;
      --border:#c8bfb0; --accent:#b5622a; --accent2:#8a7040;
      --accent3:#5a8050; --gold:#a07820; --text:#2e2418; --dim:#7a6a54;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);font-family:'Georgia',serif;color:var(--text);direction:rtl;min-height:100vh}
    header{background:linear-gradient(135deg,var(--surface),var(--surface2));border-bottom:2px solid var(--border);padding:2rem 1.5rem 1.5rem;text-align:center;position:sticky;top:0;z-index:10}
    header .icon{font-size:2.2rem}
    header h1{font-size:2rem;font-weight:normal;color:var(--gold);margin:.2rem 0 .1rem;font-family:'DanaYad',serif}
    header p{color:var(--dim);font-size:1rem;font-family:'DanaYad',serif}
    .screen{display:none}.screen.active{display:block}
    #setup-screen{max-width:480px;margin:2.5rem auto;padding:0 1.25rem}
    .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem 1.75rem;box-shadow:0 4px 20px rgba(46,36,24,.1);text-align:center}
    .setup-card .lock{font-size:2.8rem;margin-bottom:.75rem}
    .setup-card h2{color:var(--accent);font-style:italic;font-weight:normal;margin-bottom:.5rem;font-size:1.3rem}
    .setup-card p{color:var(--dim);font-size:.85rem;line-height:1.7;margin-bottom:1.5rem}
    .setup-card a{color:var(--accent)}
    .setup-card input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;font-family:monospace;background:var(--bg);color:var(--text);direction:ltr;text-align:left;margin-bottom:1rem}
    .setup-card input:focus{outline:none;border-color:var(--accent2)}
    .btn{width:100%;padding:.85rem;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:.05em;font-family:inherit;transition:opacity .15s}
    .btn:active{opacity:.8}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:disabled{background:var(--surface2);color:var(--dim);cursor:not-allowed}
    main{max-width:660px;margin:0 auto;padding:1.5rem 1rem 5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 2px 10px rgba(46,36,24,.06)}
    .card-label{display:block;color:var(--accent2);font-size:.78rem;letter-spacing:.1em;margin-bottom:.6rem}
    #tags-box{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;min-height:46px;cursor:text;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.45rem .65rem;margin-bottom:.9rem}
    .tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.2rem .55rem;font-size:.82rem;color:var(--text);display:flex;align-items:center;gap:.3rem;animation:pop .15s ease}
    .tag .rm{cursor:pointer;color:var(--dim);font-size:.75rem}
    #tag-input{background:transparent;border:none;outline:none;color:var(--text);font-size:.85rem;flex:1;min-width:120px;font-family:inherit;direction:rtl}
    #tag-input::placeholder{color:var(--dim);opacity:.55}
    .settings-row{text-align:center;margin-bottom:1.25rem}
    .settings-btn{background:none;border:none;color:var(--dim);font-size:.78rem;cursor:pointer;font-family:inherit;text-decoration:underline}
    #error-box{display:none;background:#fce8e8;border:1px solid var(--accent);border-radius:10px;padding:.9rem;color:var(--accent);text-align:center;margin-bottom:1rem;font-size:.83rem;word-break:break-word}
    .skeleton{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
    .skel-line{background:var(--surface2);border-radius:5px;animation:pulse 1.4s ease infinite}
    .meal-card{background:var(--surface);border-radius:16px;margin-bottom:1rem;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(46,36,24,.06);animation:fadeUp .25s ease both}
    .meal-card.open{border-color:var(--accent)}
    .meal-header{padding:1.1rem 1.25rem;cursor:pointer;display:flex;align-items:center;gap:.9rem;user-select:none}
    .meal-emoji{font-size:1.9rem;flex-shrink:0}
    .meal-meta{flex:1;min-width:0}
    .meal-title-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;margin-bottom:.2rem}
    .meal-name{font-size:1rem;color:var(--accent);font-style:italic}
    .diff-badge{font-size:.65rem;padding:.12rem .4rem;border-radius:8px}
    .meal-time{font-size:.7rem;color:var(--dim)}
    .meal-desc{font-size:.8rem;color:var(--dim);line-height:1.4}
    .chevron{color:var(--dim);font-size:1rem;flex-shrink:0;transition:transform .2s}
    .meal-card.open .chevron{transform:rotate(180deg)}
    .meal-body{display:none;border-top:1px solid var(--border);padding:1.1rem 1.25rem;background:var(--bg)}
    .meal-card.open .meal-body{display:block}
    .sec-label{font-size:.72rem;letter-spacing:.08em;margin:0 0 .45rem;font-weight:bold}
    .chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.9rem}
    .chip{border-radius:8px;padding:.18rem .45rem;font-size:.75rem}
    .chip-green{background:#e8f2e8;border:1px solid #b0d0b0;color:var(--accent3)}
    .chip-yellow{background:#f5efdf;border:1px solid var(--border);color:var(--accent2)}
    .steps-list{list-style:none}
    .steps-list li{display:flex;gap:.65rem;margin-bottom:.6rem;align-items:flex-start}
    .step-num{min-width:20px;height:20px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--accent);font-weight:bold;flex-shrink:0;margin-top:2px}
    .step-text{font-size:.83rem;color:var(--text);line-height:1.5}
    @keyframes pop{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes pulse{0%,100%{opacity:.7}50%{opacity:.3}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<header>
  <div class="icon">🍽️</div>
  <h1>מה לבשל היום?</h1>
  <p>הכניסי מרכיבים — ואציע לך רעיונות למנות</p>
</header>
<div id="setup-screen" class="screen active">
  <div class="setup-card">
    <div class="lock">🔑</div>
    <h2>הגדרה ראשונית</h2>
    <p>האפליקציה משתמשת ב-Claude AI של Anthropic.<br/>נדרש מפתח API — ניתן לקבל בכתובת<br/><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/><br/>המפתח נשמר רק במכשיר שלך.</p>
    <input type="password" id="setup-key-input" placeholder="sk-ant-..." autocomplete="off"/>
    <button class="btn btn-primary" id="setup-save-btn" disabled>שמרי והתחילי ←</button>
  </div>
</div>
<div id="main-screen" class="screen">
  <main>
    <div class="card">
      <span class="card-label">הכניסי מרכיבים (Enter אחרי כל אחד):</span>
      <div id="tags-box">
        <input id="tag-input" type="text" placeholder="לדוגמה: עגבניות, ביצים, גבינה..." autocomplete="off"/>
      </div>
      <button class="btn btn-primary" id="submit-btn" disabled>✨ מצא לי ארוחות</button>
    </div>
    <div class="settings-row">
      <button class="settings-btn" id="change-key-btn">⚙️ שינוי מפתח API</button>
    </div>
    <div id="error-box"></div>
    <div id="results"></div>
  </main>
</div>
<script>
const STORAGE_KEY="meal_api_key_v2";
const MODEL="claude-sonnet-4-6";
const SYSTEM_PROMPT=`אתה שף מומחה ויצירתי. כשמשתמש נותן לך מרכיבים, הצע בדיוק 3 ארוחות מגוונות.
חשוב מאוד: כל המרכיבים שהמשתמש ציין חייבים להופיע ולשמש בכל אחד מ-3 המתכונים.
ניתן להוסיף מרכיבים נוספים שישדרגו את הארוחה.
החזר JSON בלבד, ללא backticks, ללא טקסט נוסף:
{"meals":[{"name":"שם","time":"20 דקות","difficulty":"קל","emoji":"🍳","description":"תיאור קצר","ingredients_used":["מרכיב"],"extra_needed":["מרכיב"],"steps":["שלב 1","שלב 2","שלב 3"]}]}
difficulty: קל / בינוני / מאתגר בלבד.`;
const DS={"קל":{bg:"#e8f5ee",color:"#5a8050",border:"#b0d4b8"},"בינוני":{bg:"#f5f0e0",color:"#8a7040",border:"#d4c080"},"מאתגר":{bg:"#f5e8e4",color:"#b5622a",border:"#d4a090"}};
let apiKey=localStorage.getItem(STORAGE_KEY)||"";
let tags=[];
const $=id=>document.getElementById(id);
const setupScreen=$("setup-screen"),mainScreen=$("main-screen"),setupInput=$("setup-key-input"),setupSaveBtn=$("setup-save-btn"),changeKeyBtn=$("change-key-btn"),tagsBox=$("tags-box"),tagInput=$("tag-input"),submitBtn=$("submit-btn"),resultsEl=$("results"),errorBox=$("error-box");
function init(){apiKey&&apiKey.length>10?showMain():showSetup()}
function showSetup(){setupScreen.classList.add("active");mainScreen.classList.remove("active")}
function showMain(){mainScreen.classList.add("active");setupScreen.classList.remove("active")}
setupInput.addEventListener("input",()=>{setupSaveBtn.disabled=setupInput.value.trim().length<10});
setupSaveBtn.addEventListener("click",()=>{apiKey=setupInput.value.trim().replace(/\s+/g,"");localStorage.setItem(STORAGE_KEY,apiKey);showMain()});
changeKeyBtn.addEventListener("click",()=>{setupInput.value=apiKey;setupSaveBtn.disabled=false;showSetup()});
function addTag(val){const t=val.trim().replace(/,/g,"");if(t&&!tags.includes(t)){tags.push(t);renderTags()}tagInput.value="";submitBtn.disabled=tags.length===0}
function removeTag(i){tags.splice(i,1);renderTags();submitBtn.disabled=tags.length===0}
function renderTags(){tagsBox.querySelectorAll(".tag").forEach(el=>el.remove());tags.forEach((t,i)=>{const s=document.createElement("span");s.className="tag";s.innerHTML=`${t} <span class="rm">✕</span>`;s.querySelector(".rm").addEventListener("click",e=>{e.stopPropagation();removeTag(i)});tagsBox.insertBefore(s,tagInput)})}
tagInput.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();if(tagInput.value.trim())addTag(tagInput.value)}else if(e.key==="Backspace"&&!tagInput.value&&tags.length)removeTag(tags.length-1)});
tagInput.addEventListener("blur",()=>{if(tagInput.value.trim())addTag(tagInput.value)});
tagsBox.addEventListener("click",()=>tagInput.focus());
submitBtn.addEventListener("click",async()=>{
  errorBox.style.display="none";
  resultsEl.innerHTML=[1,2,3].map(()=>`<div class="skeleton"><div class="skel-line" style="width:38%;height:.95rem;margin-bottom:.65rem"></div><div class="skel-line" style="width:62%;height:.75rem"></div></div>`).join("");
  submitBtn.disabled=true;submitBtn.textContent="🔍 מחפש רעיונות...";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:2500,system:SYSTEM_PROMPT,messages:[{role:"user",content:`המרכיבים שיש לי: ${tags.join(", ")}`}]})});
    const data=await res.json();
    if(!res.ok||data.error)throw new Error(data.error?.message||`שגיאה ${res.status}`);
    const raw=(data.content||[]).map(b=>b.text||"").join("").trim();
    const match=raw.match(/\{[\s\S]*\}/);
    if(!match)throw new Error("תשובה לא תקינה");
    const parsed=JSON.parse(match[0]);
    if(!parsed.meals?.length)throw new Error("לא התקבלו הצעות");
    renderMeals(parsed.meals);
  }catch(e){resultsEl.innerHTML="";errorBox.textContent=e.message;errorBox.style.display="block"}
  submitBtn.disabled=tags.length===0;submitBtn.textContent="✨ מצא לי ארוחות";
});
function renderMeals(meals){resultsEl.innerHTML="";meals.forEach((meal,i)=>{const ds=DS[meal.difficulty]||DS["בינוני"];const card=document.createElement("div");card.className="meal-card";card.style.animationDelay=`${i*.07}s`;card.innerHTML=`<div class="meal-header"><span class="meal-emoji">${meal.emoji}</span><div class="meal-meta"><div class="meal-title-row"><span class="meal-name">${meal.name}</span><span class="diff-badge" style="background:${ds.bg};color:${ds.color};border:1px solid ${ds.border}">${meal.difficulty}</span><span class="meal-time">⏱ ${meal.time}</span></div><p class="meal-desc">${meal.description}</p></div><span class="chevron">▾</span></div><div class="meal-body"><p class="sec-label" style="color:var(--accent3)">✅ מרכיבים שיש לך:</p><div class="chips">${(meal.ingredients_used||[]).map(x=>`<span class="chip chip-green">${x}</span>`).join("")}</div>${(meal.extra_needed||[]).length?`<p class="sec-label" style="color:var(--accent2)">🛒 עוד תצטרכי:</p><div class="chips">${meal.extra_needed.map(x=>`<span class="chip chip-yellow">${x}</span>`).join("")}</div>`:""}<p class="sec-label" style="color:var(--accent)">👨‍🍳 אופן הכנה:</p><ul class="steps-list">${(meal.steps||[]).map((s,j)=>`<li><span class="step-num">${j+1}</span><span class="step-text">${s}</span></li>`).join("")}</ul></div>`;card.querySelector(".meal-header").addEventListener("click",()=>card.classList.toggle("open"));resultsEl.appendChild(card)})}
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
init();
</script>
</body>
</html>
